name: Build APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug / release / both)'
        required: false
        default: 'both'

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version

      - name: Get dependencies
        run: flutter pub get

      - name: Verify l10n generation
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build debug APK
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug' || inputs.build_type == 'both'
        run: flutter build apk --debug

      - name: Build release APK
        if: github.event_name == 'workflow_dispatch' && (inputs.build_type == 'release' || inputs.build_type == 'both') || startsWith(github.ref, 'refs/tags/v')
        run: flutter build apk --release

      - name: Locate APKs
        id: apks
        run: |
          set -e
          ls -la build/app/outputs/flutter-apk/ || true
          echo "debug_path=build/app/outputs/flutter-apk/app-debug.apk" >> $GITHUB_OUTPUT
          echo "release_path=build/app/outputs/flutter-apk/app-release.apk" >> $GITHUB_OUTPUT

      - name: Upload debug APK
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug' || inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: remotecam-debug-apk
          path: ${{ steps.apks.outputs.debug_path }}
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APK
        if: github.event_name == 'workflow_dispatch' && (inputs.build_type == 'release' || inputs.build_type == 'both') || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: remotecam-release-apk
          path: ${{ steps.apks.outputs.release_path }}
          if-no-files-found: warn
          retention-days: 60

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
